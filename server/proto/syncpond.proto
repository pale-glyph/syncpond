syntax = "proto3";

package syncpond.upstream;

message NewRoomRequest { string name = 1; }
message NewRoomResponse { uint64 room_id = 1; }

message ListRoomsRequest {}
message ListRoomsResponse { repeated string rooms = 1; }

message DeleteRoomRequest { uint64 room_id = 1; }
message DeleteRoomResponse {}

message IssueJwtRequest { uint64 room_id = 1; repeated string containers = 2; }
message IssueJwtResponse { string jwt = 1; }

message CreateBucketRequest { uint64 room_id = 1; uint64 bucket_id = 2; }
message CreateBucketResponse {}

message DeleteBucketRequest { uint64 room_id = 1; uint64 bucket_id = 2; }
message DeleteBucketResponse {}

message ListBucketsRequest { uint64 room_id = 1; }
message ListBucketsResponse { repeated uint64 bucket_ids = 1; }

message SetRoomLabelRequest { uint64 room_id = 1; string label = 2; }
message SetRoomLabelResponse {}

message GetRoomLabelRequest { uint64 room_id = 1; }
message GetRoomLabelResponse { string label = 1; }

message SetBucketLabelRequest { uint64 room_id = 1; uint64 bucket_id = 2; string label = 3; }
message SetBucketLabelResponse {}

message GetBucketLabelRequest { uint64 room_id = 1; uint64 bucket_id = 2; }
message GetBucketLabelResponse { string label = 1; }

service CommandService {
  rpc NewRoom (NewRoomRequest) returns (NewRoomResponse);
  rpc ListRooms (ListRoomsRequest) returns (ListRoomsResponse);
  rpc DeleteRoom (DeleteRoomRequest) returns (DeleteRoomResponse);
  rpc IssueJwt (IssueJwtRequest) returns (IssueJwtResponse);
  rpc CreateBucket (CreateBucketRequest) returns (CreateBucketResponse);
  rpc DeleteBucket (DeleteBucketRequest) returns (DeleteBucketResponse);
  rpc ListBuckets (ListBucketsRequest) returns (ListBucketsResponse);
  rpc SetRoomLabel (SetRoomLabelRequest) returns (SetRoomLabelResponse);
  rpc GetRoomLabel (GetRoomLabelRequest) returns (GetRoomLabelResponse);
  rpc SetBucketLabel (SetBucketLabelRequest) returns (SetBucketLabelResponse);
  rpc GetBucketLabel (GetBucketLabelRequest) returns (GetBucketLabelResponse);
}
