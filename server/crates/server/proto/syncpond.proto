syntax = "proto3";

package syncpond.upstream;

message NewRoomRequest { string name = 1; }
message NewRoomResponse { uint64 room_id = 1; }

message ListRoomsRequest {}
message ListRoomsResponse { repeated string rooms = 1; }

message DeleteRoomRequest { uint64 room_id = 1; }
message DeleteRoomResponse {}

message IssueJwtRequest { uint64 room_id = 1; string sub = 2; repeated uint64 buckets = 3; }
message IssueJwtResponse { string jwt = 1; }

message NewBucketRequest { uint64 room_id = 1; uint64 bucket_id = 2; string label = 3; }
message NewBucketResponse {}

message DeleteBucketRequest { uint64 room_id = 1; uint64 bucket_id = 2; }
message DeleteBucketResponse {}

message NewMemberRequest { uint64 room_id = 1; string member = 2; }
message NewMemberResponse {}

message DeleteMemberRequest { uint64 room_id = 1; string member = 2; }
message DeleteMemberResponse {}

message ListMembersRequest { uint64 room_id = 1; }
message ListMembersResponse { repeated string members = 1; }

message ListBucketsRequest { uint64 room_id = 1; }
message ListBucketsResponse { repeated string buckets = 1; }

message ReadFragmentRequest { uint64 room_id = 1; uint64 bucket_id = 2; string key = 3; }
message ReadFragmentResponse { bytes data = 1; bool found = 2; }

message WriteFragmentRequest { uint64 room_id = 1; uint64 bucket_id = 2; string key = 3; bytes data = 4; }
message WriteFragmentResponse {}

message LoadRoomRequest { uint64 room_id = 1; }
message LoadRoomResponse {}

message UnloadRoomRequest { uint64 room_id = 1; }
message UnloadRoomResponse {}

// Room/bucket labels are set at creation time; no separate get/set RPCs.

service CommandService {
  rpc NewRoom (NewRoomRequest) returns (NewRoomResponse);
  rpc ListRooms (ListRoomsRequest) returns (ListRoomsResponse);
  rpc DeleteRoom (DeleteRoomRequest) returns (DeleteRoomResponse);
  rpc IssueJwt (IssueJwtRequest) returns (IssueJwtResponse);
  rpc NewBucket (NewBucketRequest) returns (NewBucketResponse);
  rpc DeleteBucket (DeleteBucketRequest) returns (DeleteBucketResponse);
  rpc ListBuckets (ListBucketsRequest) returns (ListBucketsResponse);
  rpc NewMember (NewMemberRequest) returns (NewMemberResponse);
  rpc DeleteMember (DeleteMemberRequest) returns (DeleteMemberResponse);
  rpc ListMembers (ListMembersRequest) returns (ListMembersResponse);
  rpc ReadFragment (ReadFragmentRequest) returns (ReadFragmentResponse);
  rpc WriteFragment (WriteFragmentRequest) returns (WriteFragmentResponse);
  rpc LoadRoom (LoadRoomRequest) returns (LoadRoomResponse);
  rpc UnloadRoom (UnloadRoomRequest) returns (UnloadRoomResponse);
}
