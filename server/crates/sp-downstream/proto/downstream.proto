syntax = "proto3";
package syncpond_downstream;

message WsEnvelope {
  oneof payload {
    Auth auth = 1;
    AuthOk auth_ok = 2;
    AuthError auth_error = 3;
    DataUpdate data_update = 4;
    ClientCommand client_command = 5;
  }
}

message Auth {
  string jwt = 1;
  uint64 last_seen_counter = 2;
}

message AuthOk {
  uint64 room_counter = 1;
}

message AuthError {
  string reason = 1;
  string detail = 2;
}

message DataUpdate {
  uint64 bucket_id = 1;
  string key = 2;
  bytes value = 3;
  uint64 bucket_counter = 4;
  bool deleted = 5;
}

message ClientCommand {
  bytes payload = 1;
}
